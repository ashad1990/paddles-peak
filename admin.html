<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Paddles Peak</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- LOGIN GATE -->
<div class="admin-gate" id="admin-gate">
  <div class="admin-login-box">
    <div style="font-size:2.5rem;margin-bottom:0.75rem;">🏔️</div>
    <h2>Paddles Peak Admin</h2>
    <p>Enter the admin password to access the dashboard.</p>
    <div class="admin-login-error" id="admin-login-error"></div>
    <div class="form-group" style="text-align:left;">
      <label for="admin-password">Password</label>
      <input type="password" id="admin-password" placeholder="Enter password" style="width:100%;">
    </div>
    <button class="btn btn-primary btn-full" id="admin-login-btn" style="margin-top:0.5rem;">Sign In</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="admin-dashboard" style="display:none;">
  <div class="admin-header">
    <div class="admin-header-inner">
      <div class="admin-logo">PADDLES <span>PEAK</span> <span style="font-size:0.8rem;font-weight:400;opacity:0.6;margin-left:0.5rem;">Admin Dashboard</span></div>
      <div class="admin-nav">
        <a href="index.html">← View Site</a>
        <button class="btn btn-outline-light" id="admin-signout-btn" style="font-size:0.82rem;padding:0.4rem 1rem;">Sign Out</button>
      </div>
    </div>
  </div>

  <div class="container" style="padding-bottom:4rem;">
    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon">📦</div>
        <div class="stat-label">Total Orders</div>
        <div class="stat-value" id="stat-orders">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">💰</div>
        <div class="stat-label">Total Revenue</div>
        <div class="stat-value" id="stat-revenue">$0.00</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">🏷️</div>
        <div class="stat-label">Units in Stock</div>
        <div class="stat-value" id="stat-stock">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">⚠️</div>
        <div class="stat-label">Low Stock Items</div>
        <div class="stat-value" id="stat-lowstock">0</div>
      </div>
    </div>

    <!-- Inventory Table -->
    <div class="admin-section">
      <h3>Inventory</h3>
      <table class="admin-table">
        <thead>
          <tr>
            <th>Product</th>
            <th>Price</th>
            <th>Stock</th>
            <th>Rating</th>
          </tr>
        </thead>
        <tbody id="inventory-tbody"></tbody>
      </table>
    </div>

    <!-- Orders Table -->
    <div class="admin-section">
      <h3>Orders</h3>
      <table class="admin-table">
        <thead>
          <tr>
            <th>Order ID</th>
            <th>Date</th>
            <th>Customer</th>
            <th>Items</th>
            <th>Total</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="orders-tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<script src="js/products.js"></script>
<script src="js/cart.js"></script>
<script src="js/orders.js"></script>
<script src="js/main.js"></script>
</body>
</html>
