<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 450" width="250" height="450">
  <defs>
    <linearGradient id="faceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4eef7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b8dff0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="handleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d0d1a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="edgeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2dd4bf;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2dd4bf;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="3" dy="6" stdDeviation="6" flood-color="rgba(0,0,0,0.3)"/>
    </filter>
    <clipPath id="faceClip">
      <rect x="25" y="20" width="200" height="280" rx="50" ry="50"/>
    </clipPath>
  </defs>
  <!-- Background -->
  <rect width="250" height="450" fill="white"/>
  <!-- Handle shadow -->
  <rect x="108" y="290" width="34" height="110" rx="8" fill="rgba(0,0,0,0.2)" transform="translate(3,4)"/>
  <!-- Handle -->
  <rect x="108" y="290" width="34" height="110" rx="8" fill="url(#handleGrad)" filter="url(#shadow)"/>
  <!-- Grip wraps -->
  <rect x="108" y="300" width="34" height="6" rx="2" fill="#2dd4bf" opacity="0.8"/>
  <rect x="108" y="314" width="34" height="6" rx="2" fill="#2dd4bf" opacity="0.8"/>
  <rect x="108" y="328" width="34" height="6" rx="2" fill="#2dd4bf" opacity="0.8"/>
  <rect x="108" y="342" width="34" height="6" rx="2" fill="#2dd4bf" opacity="0.8"/>
  <rect x="108" y="356" width="34" height="6" rx="2" fill="#2dd4bf" opacity="0.8"/>
  <rect x="108" y="370" width="34" height="6" rx="2" fill="#2dd4bf" opacity="0.8"/>
  <rect x="108" y="384" width="34" height="4" rx="2" fill="#1a1a2e"/>
  <!-- Butt cap -->
  <rect x="106" y="392" width="38" height="10" rx="5" fill="#0d0d1a"/>
  <!-- Paddle face shadow -->
  <rect x="25" y="20" width="200" height="280" rx="50" fill="rgba(0,0,0,0.15)" transform="translate(4,6)"/>
  <!-- Paddle face -->
  <rect x="25" y="20" width="200" height="280" rx="50" fill="url(#faceGrad)" filter="url(#shadow)"/>
  <!-- Face edge/guard -->
  <rect x="25" y="20" width="200" height="280" rx="50" fill="none" stroke="url(#edgeGrad)" stroke-width="6"/>
  <!-- Paddle face inner content clipped -->
  <g clip-path="url(#faceClip)">
    <!-- Background teal gradient overlay at bottom of face -->
    <rect x="25" y="200" width="200" height="100" fill="#0d4a5a" opacity="0.15"/>
    <!-- Mountain silhouette -->
    <polygon points="125,90 75,195 175,195" fill="#0e4d5e" opacity="0.85"/>
    <polygon points="85,130 45,195 125,195" fill="#0a3a47" opacity="0.75"/>
    <polygon points="170,110 130,195 210,195" fill="#0a3a47" opacity="0.75"/>
    <!-- Snow caps -->
    <polygon points="125,90 110,118 140,118" fill="white" opacity="0.9"/>
    <polygon points="85,130 75,152 95,152" fill="white" opacity="0.8"/>
    <polygon points="170,110 160,135 180,135" fill="white" opacity="0.8"/>
    <!-- Stars/dots decoration -->
    <circle cx="55" cy="65" r="2" fill="#2dd4bf" opacity="0.7"/>
    <circle cx="190" cy="55" r="1.5" fill="#2dd4bf" opacity="0.6"/>
    <circle cx="170" cy="75" r="1" fill="#2dd4bf" opacity="0.5"/>
    <circle cx="65" cy="85" r="1.5" fill="#2dd4bf" opacity="0.6"/>
  </g>
  <!-- Paddle text -->
  <text x="125" y="225" font-family="Arial, sans-serif" font-size="13" font-weight="900" fill="#0e4d5e" text-anchor="middle" letter-spacing="3">PADDLES</text>
  <text x="125" y="244" font-family="Arial, sans-serif" font-size="13" font-weight="900" fill="#0e4d5e" text-anchor="middle" letter-spacing="3">PEAK</text>
  <!-- Teal accent line under text -->
  <line x1="85" y1="250" x2="165" y2="250" stroke="#2dd4bf" stroke-width="2" opacity="0.8"/>
  <!-- Throat/neck area -->
  <path d="M108,295 Q95,285 25,280 Q25,295 108,300 Z" fill="#c5dce8" opacity="0.5"/>
  <path d="M142,295 Q155,285 225,280 Q225,295 142,300 Z" fill="#c5dce8" opacity="0.5"/>
</svg>
